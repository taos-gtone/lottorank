<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100" font-family="'Segoe UI', Arial, sans-serif">

  <!-- 배경 -->
  <rect width="320" height="100" rx="12" fill="#0B2D5E"/>

  <!-- 볼 6개 (당첨번호 스타일) -->
  <!-- 볼1: 노랑(1~10) -->
  <circle cx="28" cy="38" r="15" fill="url(#g1)"/>
  <text x="28" y="43" text-anchor="middle" font-size="11" font-weight="900" fill="#fff">7</text>

  <!-- 볼2: 파랑(11~20) -->
  <circle cx="62" cy="38" r="15" fill="url(#g2)"/>
  <text x="62" y="43" text-anchor="middle" font-size="11" font-weight="900" fill="#fff">14</text>

  <!-- 볼3: 빨강(21~30) -->
  <circle cx="96" cy="38" r="15" fill="url(#g3)"/>
  <text x="96" y="43" text-anchor="middle" font-size="11" font-weight="900" fill="#fff">23</text>

  <!-- 볼4: 회색(31~40) -->
  <circle cx="130" cy="38" r="15" fill="url(#g4)"/>
  <text x="130" y="43" text-anchor="middle" font-size="11" font-weight="900" fill="#fff">35</text>

  <!-- 볼5: 초록(41~45) -->
  <circle cx="164" cy="38" r="15" fill="url(#g5)"/>
  <text x="164" y="43" text-anchor="middle" font-size="11" font-weight="900" fill="#fff">42</text>

  <!-- 플러스 구분 -->
  <text x="185" y="43" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.4)" font-weight="700">+</text>

  <!-- 보너스 볼: 금색 테두리 -->
  <circle cx="204" cy="38" r="15" fill="url(#g5)" stroke="#E8A000" stroke-width="2.5"/>
  <text x="204" y="43" text-anchor="middle" font-size="11" font-weight="900" fill="#fff">45</text>

  <!-- 사이트명 -->
  <text x="26" y="80" font-size="20" font-weight="900" fill="#fff" letter-spacing="-0.5">로또</text>
  <text x="76" y="80" font-size="20" font-weight="900" fill="#E8A000" letter-spacing="-0.5">랭크</text>

  <!-- 영문 서브타이틀 -->
  <text x="122" y="78" font-size="9" font-weight="600" fill="rgba(255,255,255,0.45)" letter-spacing="2">LOTTORANK</text>

  <!-- 트로피 아이콘 (오른쪽) -->
  <text x="272" y="64" font-size="36" text-anchor="middle">🏆</text>

  <!-- 그라디언트 정의 -->
  <defs>
    <!-- 노랑 볼 -->
    <radialGradient id="g1" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="100%" stop-color="#D48000"/>
    </radialGradient>
    <!-- 파랑 볼 -->
    <radialGradient id="g2" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#64B0FF"/>
      <stop offset="100%" stop-color="#1040C0"/>
    </radialGradient>
    <!-- 빨강 볼 -->
    <radialGradient id="g3" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#FF7070"/>
      <stop offset="100%" stop-color="#C01010"/>
    </radialGradient>
    <!-- 회색 볼 -->
    <radialGradient id="g4" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#AAAAAA"/>
      <stop offset="100%" stop-color="#444444"/>
    </radialGradient>
    <!-- 초록 볼 -->
    <radialGradient id="g5" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#66CC88"/>
      <stop offset="100%" stop-color="#1A7A3A"/>
    </radialGradient>
  </defs>
</svg>
